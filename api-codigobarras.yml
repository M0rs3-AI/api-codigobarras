# Bridge de codigo de barras - despliegue local en el servidor del cliente.
#
# El bridge se expone a internet de una de estas dos formas (ver reverse-proxy.md):
#
#   Opcion A (Cliente con puertos disponibles):
#     Publica un puerto del contenedor en el host y lo abres en el firewall.
#     Es lo que hace la seccion "ports:" de abajo por defecto.
#
#   Opcion B (Cliente con un solo puerto / reverse proxy):
#     Un reverse proxy (Traefik, nginx, Caddy...) enruta varios servicios por
#     un mismo puerto (80/443). En ese caso normalmente NO publicas el puerto:
#     conectas este contenedor a la red del proxy y el proxy enruta hacia el.
#     Ver los bloques comentados "labels" / "networks" y reverse-proxy.md.
#
# Uso:
#   1. Copia .env.example a .env y completa tus datos (ver README.md).
#   2. docker compose -f api-codigobarras.yml up -d --build
#   3. curl http://IP-O-DOMINIO:PUERTO/health
#
# Variables (vienen de .env, docker-compose las lee automaticamente):
#   BRIDGE_TOKEN, SQL_SERVER, SQL_PORT, SQL_DATABASE, SQL_USER, SQL_PASSWORD,
#   SP_NAME, PORT, HOST_PORT

services:
  api-codigobarras:
    build: .
    image: bridge-codigobarras:latest
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      # Permite usar "host.docker.internal" cuando SQL Server corre en el
      # mismo Windows Server que Docker (ver README.md). No afecta si no se usa.
      - "host.docker.internal:host-gateway"

    # --- Opcion A: publicar el puerto en el host ---
    # HOST_PORT es el puerto que abres en el firewall del cliente (elige uno
    # que tengas disponible). PORT es el puerto interno del contenedor.
    # Si usas SOLO un reverse proxy (Opcion B), puedes comentar esta seccion
    # para no exponer el puerto directamente.
    ports:
      - "${HOST_PORT:-3001}:${PORT:-3001}"

    # --- Opcion B: reverse proxy (Traefik / nginx / Caddy) ---
    # Si expones varios servicios detras de un reverse proxy por un unico
    # puerto, conecta este contenedor a la red del proxy y deja que el proxy
    # enrute hacia el. Ver reverse-proxy.md. Ejemplo con Traefik (descomenta
    # estas "labels", el bloque "networks:" del servicio y el de nivel raiz):
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.codigobarras.rule=Host(`cliente1.tudominio.com`)"
    #   - "traefik.http.routers.codigobarras.entrypoints=websecure"
    #   - "traefik.http.routers.codigobarras.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.codigobarras.loadbalancer.server.port=${PORT:-3001}"
    # networks:
    #   - proxy

# Red externa compartida con el reverse proxy (Opcion B). Descomenta junto con
# el bloque "networks:" del servicio. La red debe existir ya (la crea el proxy,
# o: docker network create proxy).
# networks:
#   proxy:
#     external: true
