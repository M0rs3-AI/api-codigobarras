# Stack de Docker Swarm: Traefik (TLS automático) + API MSSQL proxy.
#
# Pasos manuales una sola vez por VPS (no requieren script):
#   1. docker swarm init                                  (si aún no es swarm)
#   2. echo -n "$(openssl rand -hex 32)" | docker secret create internal_secret -
#      -> copia el secret impreso por openssl, va en Supabase como VPS_INTERNAL_SECRET
#   3. Edita DOMAIN y ACME_EMAIL mas abajo (lineas marcadas EDITAR)
#
# Para desplegar / actualizar:
#   docker build -t bizor-mssql-proxy:latest .
#   docker stack deploy -c api.yml bizor
#
# Verificar:
#   docker service ps bizor_api
#   docker service logs -f bizor_api
#   curl https://TU_DOMINIO/health

version: "3.9"

services:
  traefik:
    image: traefik:v3.1
    command:
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=bizor_net
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=tu-email@tudominio.com # EDITAR
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=WARN
      - --accesslog=true
      - --api.dashboard=false
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    networks:
      - bizor_net
    volumes:
      # Necesario para que Traefik descubra servicios vía Docker API.
      # Solo lectura: Traefik no puede modificar contenedores.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  api:
    image: bizor-mssql-proxy:latest
    networks:
      - bizor_net
    secrets:
      - internal_secret
    environment:
      NODE_ENV: production
      PORT: "3000"
      INTERNAL_SECRET_FILE: /run/secrets/internal_secret
      TRUST_PROXY_HOPS: "1"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
        max_attempts: 5
        window: 30s
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.http.routers.bizor-api.rule=Host(`api.tudominio.com`) # EDITAR
        - traefik.http.routers.bizor-api.entrypoints=websecure
        - traefik.http.routers.bizor-api.tls.certresolver=le
        - traefik.http.services.bizor-api.loadbalancer.server.port=3000
        # Defensa en profundidad opcional: restringir a las IPs salientes
        # de Supabase (https://supabase.com/docs/guides/functions/networking).
        # Descomentar y completar el rango para activarlo:
        # - traefik.http.routers.bizor-api.middlewares=bizor-ipallow
        # - traefik.http.middlewares.bizor-ipallow.ipallowlist.sourcerange=203.0.113.0/24

networks:
  bizor_net:
    driver: overlay

volumes:
  traefik_certs:

secrets:
  internal_secret:
    external: true
